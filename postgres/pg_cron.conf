# Postgres config snippet pra habilitar pg_cron.
# Montado em /etc/postgresql/conf.d/ via volume no docker-compose.test.yml.
#
# IMPORTANTE: shared_preload_libraries SÓ tem efeito quando setado ANTES
# do boot do Postgres. Se setar via SQL após boot, NÃO funciona.
#
# Esse arquivo é redundante com os -c flags no docker-compose `command:`
# mas serve como fallback declarativo + documentação.

shared_preload_libraries = 'pg_cron'
cron.database_name = 'valbot_test'
cron.use_background_workers = on

# Opcional: log de execução de cron jobs (útil em ambiente de teste pra
# debug; em prod pode encher disco rápido).
cron.log_run = on
cron.log_min_messages = notice
