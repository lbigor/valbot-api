# Nginx config dentro do container `valbot-api`.
# Serve frontend estático em / e proxya /api e /static para uvicorn 127.0.0.1:8001.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root  /opt/valbot/frontend-dist/public;
    index index.html;

    # Limite generoso pra metadados de upload — vídeo grande vai direto pro GCS via signed URL,
    # então a API só recebe JSON pequeno. 5MB é folga.
    client_max_body_size 5m;

    # gzip para assets estáticos do frontend.
    gzip               on;
    gzip_min_length    1k;
    gzip_comp_level    5;
    gzip_types         text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary          on;

    # SPA routing: tudo que não é arquivo estático vai pra index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend FastAPI.
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_buffering    off;
        proxy_read_timeout 600s;   # análises podem demorar
        proxy_send_timeout 600s;
    }

    # Static (vídeos legados, thumbs).
    location /static/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Health endpoint dedicado (Cloudflare/uptime check vão aqui).
    location = /health {
        access_log off;
        proxy_pass http://127.0.0.1:8001/api/health;
    }

    # Headers de segurança básicos.
    add_header X-Content-Type-Options "nosniff"           always;
    add_header X-Frame-Options        "SAMEORIGIN"        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header X-Request-ID           $request_id         always;

    # Cache agressivo para assets versionados do Vite (hash no filename).
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }
}
