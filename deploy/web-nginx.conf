# Nginx config do container `valbot-web` (frontend Vite + reverse proxy /api → valbot-api).
# Versão deployada em /opt/valbot-deploy/web/nginx.conf na VM valbot-prod.
#
# Diferente de `deploy/nginx.conf` (que vai DENTRO da imagem valbot-api e tem 5m),
# este é o edge interno (depois do tunnel Cloudflare) e aceita até 200m porque
# enquanto a Fase C (signed URL) não está pronta, o multipart legado precisa passar.
# Quando signed URL estiver no ar, este limite pode cair pra 5m também.

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 200m;

  location /api/ {
    proxy_pass         http://api:80;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
